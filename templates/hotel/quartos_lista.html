{% extends 'base.html' %}
{% block content %}
<div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
    <div class="p-6 border-b flex justify-between items-center">
        <h3 class="font-bold text-slate-800 uppercase text-xs tracking-widest">Unidades / Quartos</h3>
        <a href="{% url 'hotel:novo_quarto' %}" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold">+ NOVO QUARTO</a>
    </div>
    <table class="w-full text-left">
        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
            <tr>
                <th class="px-6 py-4">Número</th>
                <th class="px-6 py-4">Categoria</th>
                <th class="px-6 py-4">Status</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-100">
            {% for q in quartos %}
            <tr class="text-sm hover:bg-slate-50">
                <td class="px-6 py-4 font-black text-slate-800">{{ q.numero }}</td>
                <td class="px-6 py-4 text-slate-600 font-medium">{{ q.categoria.nome }}</td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase 
                    {% if q.status == 'DISPONIVEL' %} bg-emerald-100 text-emerald-700
                    {% elif q.status == 'OCUPADO' %} bg-rose-100 text-rose-700
                    {% else %} bg-amber-100 text-amber-700 {% endif %}">
                        {{ q.get_status_display }}
                    </span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
